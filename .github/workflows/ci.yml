name: CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ci.yml'

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run unit tests
        run: npm test -- --reporter=verbose
        env:
          NODE_ENV: test

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Debug - check server & browser
        run: |
          echo "=== Start dev server in background ==="
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY='pk_test_ZHVtbXkuZXhhbXBsZS5jb20k' \
          CLERK_SECRET_KEY='sk_test_dummy' \
          NEXT_PUBLIC_APP_URL='http://localhost:3000' \
          DATABASE_URL='postgresql://localhost:5432/tip' \
          npx next dev --hostname 0.0.0.0 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          echo "=== Wait for server ==="
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:3000; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 2
          done
          echo "=== curl localhost ==="
          curl -sI http://localhost:3000 | head -5
          echo "=== curl 127.0.0.1 ==="
          curl -sI http://127.0.0.1:3000 | head -5
          echo "=== Test Chromium directly ==="
          node -e "
            const { chromium } = require('playwright');
            (async () => {
              const browser = await chromium.launch({
                args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage'],
              });
              const page = await browser.newPage();
              try {
                const res = await page.goto('http://localhost:3000', { timeout: 10000 });
                console.log('Status:', res?.status());
              } catch (e) {
                console.log('Error:', e.message);
              }
              try {
                const res = await page.goto('http://127.0.0.1:3000', { timeout: 10000 });
                console.log('Status 127.0.0.1:', res?.status());
              } catch (e) {
                console.log('Error 127.0.0.1:', e.message);
              }
              try {
                const res = await page.goto('https://example.com', { timeout: 10000 });
                console.log('Status example.com:', res?.status());
              } catch (e) {
                console.log('Error example.com:', e.message);
              }
              await browser.close();
            })();
          "
          kill $SERVER_PID 2>/dev/null || true
        env:
          NODE_ENV: test

      - name: Run Playwright tests (public only)
        run: xvfb-run npx playwright test --project=public
        env:
          NODE_ENV: test
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: 'pk_test_ZHVtbXkuZXhhbXBsZS5jb20k'
          CLERK_SECRET_KEY: 'sk_test_dummy'
          DEVICE_API_KEY: 'test-device-api-key'
          CRON_SECRET: 'test-cron-secret'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          DATABASE_URL: 'postgresql://localhost:5432/tip'
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: 'pk_test_dummy'
          STRIPE_SECRET_KEY: 'sk_test_dummy'
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: 'dummy'
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: '/sign-in'
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: '/sign-up'
          RESEND_API_KEY: 're_dummy'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests]
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          # Build-time env vars (dummy values for CI build validation)
          DATABASE_URL: 'postgresql://localhost:5432/tip'
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_ZHVtbXkuZXhhbXBsZS5jb20k' }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_dummy' }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY || 'pk_test_dummy' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_dummy' }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY || 'dummy' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://tip.live' }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: '/sign-in'
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: '/sign-up'
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 're_dummy' }}
          CRON_SECRET: 'ci-dummy-cron-secret'
